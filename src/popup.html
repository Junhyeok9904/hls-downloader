<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 350px; padding: 15px; font-family: sans-serif; }
        .stream-item { border: 1px solid #ccc; padding: 5px; margin-bottom: 5px; cursor: pointer; }
        #progress-container { margin-top: 10px; }
        progress { width: 100%; }
    </style>
</head>
<body>
    <h3>HLS Downloader</h3>
    <div id="content"></div>
    <div id="progress-container" class="hidden">
        <progress id="download-progress" value="0" max="100"></progress>
        <p id="status-text">Ready</p>
        <label><input type="checkbox" id="auth-confirm"> I have permission to download this.</label>
    </div>
    <script src="popup.js"></script>
</body>
</html>
